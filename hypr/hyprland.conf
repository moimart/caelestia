env = GDK_SCALE, 2.0
env = XCURSOR_SIZE, 32
# Make workspace 5 “bigger” (tweak 1.25 / 1.5 / 1.75)
workspace = 5, xwaylandscale:3
#windowrulev2 = workspace 5 silent, class:^(resolve)$

$hypr = ~/.config/hypr
$hl = $hypr/hyprland
$cConf = ~/.config/caelestia
#exec-once = /usr/bin/hyprctl output create headless HEADLESS-STREAM
# Variables (colours + other vars)
exec = cp -L --no-preserve=mode --update=none $hypr/scheme/default.conf $hypr/scheme/current.conf
source = $hypr/scheme/current.conf
source = $hypr/variables.conf

exec-once = hypridle

# User variables
exec = mkdir -p $cConf && touch -a $cConf/hypr-vars.conf
source = $cConf/hypr-vars.conf

# Default monitor conf
monitor =,7680x2160@120,auto,1.6666,bitdepth,10#,cm,hdr,sdrbrightness,1.5,sdrsaturation,1.2
monitor = HEADLESS-STREAM,1920x1080, 7680x0,1 
# Configs
source = $hl/env.conf
source = $hl/general.conf
source = $hl/input.conf
source = $hl/misc.conf
source = $hl/animations.conf
source = $hl/decoration.conf
source = $hl/group.conf
source = $hl/execs.conf
source = $hl/rules.conf
source = $hl/gestures.conf
source = $hl/keybinds.conf

# User configs
exec = mkdir -p $cConf && touch -a $cConf/hypr-user.conf
source = $cConf/hypr-user.conf

general {
 #layout = scrolling
}

layout {
    single_window_aspect_ratio = 2 1
}

scrolling {
    column_width = 0.33
}

animations {
    enabled = true
    
    bezier = easeOut, 0.16, 1, 0.3, 1
    
    animation = zoomFactor, 1, 6, easeOut  # 6ds = 600ms (not 0.6!)
}

misc {
    allow_session_lock_restore = true
}

xwayland {
  force_zero_scaling = true
}

render {
  cm_fs_passthrough = true
}
workspace = 2, layout:scrolling

bind = Ctrl+Super, period, layoutmsg, move +col
bind = Ctrl+Super, comma, layoutmsg, move -col

# Zoom binds
bind = Ctrl+Super, mouse:274, exec, hyprctl keyword cursor:zoom_factor 3.0
bindr = Ctrl+Super, mouse:274, exec, hyprctl keyword cursor:zoom_factor 1.0

bind = SUPER, mouse_up, exec, hyprctl keyword cursor:zoom_factor $(awk "BEGIN {print $(hyprctl getoption cursor:zoom_factor | grep 'float:' | awk '{print $2}') - 0.5}")
bind = SUPER, mouse_down, exec, hyprctl keyword cursor:zoom_factor $(awk "BEGIN {print $(hyprctl getoption cursor:zoom_factor | grep 'float:' | awk '{print $2}') + 0.5}")

bind = Shift+Super, mouse_up, layoutmsg, move +col
bind = Shift+Super, mouse_down, layoutmsg, move -col

bindo = MOD3 SUPER, up, exec, hyprctl keyword cursor:zoom_factor $(hyprctl getoption cursor:zoom_factor | awk '/float:/ {print $2-0.5}')
bindo = MOD3 SUPER, down, exec, hyprctl keyword cursor:zoom_factor $(hyprctl getoption cursor:zoom_factor | awk '/float:/ {print $2+0.5}')

