background {
    monitor =
    path = /home/moimart/.local/state/caelestia/wallpaper/current
    blur_passes = 2
    blur_size = 5
    brightness = 0.5
}

image {
    monitor =
    path = /home/moimart/.face
    size = 200
    rounding = -1
    border_size = 4
    border_color = rgb(200, 200, 200)
    position = 0, 75
    halign = center
    valign = center
}

input-field {
    monitor =
    size = 800, 100
    outline_thickness = 3
    dots_size = 0.66
    dots_spacing = 0.30
    dots_center = true
    outer_color = rgb(151515)
    inner_color = rgb(200, 200, 200)
    font_color = rgb(10, 10, 10)
    fade_on_empty = true
    placeholder_text = <i>Password...</i>
    hide_input = false
    position = 0, -200
    halign = center
    valign = center
}

label {
    monitor =
    text = cmd[update:1000] echo "$TIME"
    color = rgba(200, 200, 200, 1.0)
    font_size = 128
    font_family = Noto Sans Bold
    position = 0, 300
    halign = center
    valign = center
}

